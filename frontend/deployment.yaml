apiVersion: apps/v1
kind: Deployment
metadata:
  name: cn-todo-frontend
  labels:
    app: cn-todo-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cn-todo-frontend
  template:
    metadata:
      labels:
        app: cn-todo-frontend
    spec:
      containers:
        - name: cn-todo-frontend
          image: cn-todo-fe:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: BACKEND_URL
              value: "http://cn-todo-backend:8000"
---
apiVersion: v1
kind: Service
metadata:
  name: cn-todo-frontend
spec:
  type: NodePort
  selector:
    app: cn-todo-frontend
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30080
